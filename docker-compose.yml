version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: football_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: football_pass
      POSTGRES_DB: football_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: football_backend
    ports:
      - "8000:8000"
        environment:
      - DATABASE_URL=postgresql://postgres:football_pass@db:5432/football_db
      - MODEL_PATH=./model.h5
    depends_on:
      - db
    volumes:
      - backend_data:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: football_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: football_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: football_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  backend_data:
  postgres_data:
