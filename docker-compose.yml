version: '3.8'

services:
  backend:
    build: ./backend
    container_name: football_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./football.db
    volumes:
      - backend_data:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: football_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: football_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: football_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  backend_data:
